name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -q

      - name: Extract version from pom.xml
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Verify tag matches version
        run: |
          POM_VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG="${{ github.ref_name }}"
          # Remove 'v' prefix from tag if it exists (e.g., v1.0.0 -> 1.0.0)
          CLEAN_TAG="${TAG#v}"
          if [ "$POM_VERSION" != "$CLEAN_TAG" ]; then
            echo "Error: Tag '$TAG' does not match version '$POM_VERSION' in pom.xml"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/raczmirko/drone-project-manager-backend:latest
            ghcr.io/raczmirko/drone-project-manager-backend:${{ github.ref_name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/drone-project-manager
            docker compose pull backend
            docker compose up -d --no-deps --force-recreate backend